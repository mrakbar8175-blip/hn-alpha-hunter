name: Daily AI Tool Hunter

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests

      - name: Download previous sent IDs
        uses: actions/download-artifact@v4
        with:
          name: sent-tool-ids
          path: .
        continue-on-error: true

      - name: Run AI Tool Hunter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python ai_tool_hunter.py

      - name: Upload updated sent IDs
        uses: actions/upload-artifact@v4
        with:
          name: sent-tool-ids
          path: sent_tools.json