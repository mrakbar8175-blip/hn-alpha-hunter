name: Daily Bounty Hunter

on:
  schedule:
    - cron: '0 18 * * *' # Runs every day at 6:00 PM UTC
  workflow_dispatch:

jobs:
  hunt-bounties:
    runs-on: ubuntu-latest
    
    # 👇 We must give GitHub permission to push files back to the repo!
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run the Bounty Hunter
        env:
          BOUNTY_HUNTER_WEBHOOK: ${{ secrets.BOUNTY_HUNTER_WEBHOOK }}
        run: python bounty_hunter.py

      # 👇 NEW STEP: Save the memory file back to GitHub!
      - name: Commit and push state file
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add sent_bounties.json
          # This checks if there are actual changes before trying to commit
          if git commit -m "Update sent bounties state"; then
            git push
          else
            echo "No new bounties to save."
          fi