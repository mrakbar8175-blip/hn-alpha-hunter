name: Daily AI Tool Hunter

on:
  schedule:
    - cron: '0 12 * * *'   # daily
  workflow_dispatch:        # manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the updated file back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # fetch full history so we can commit/push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Tool Hunter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python ai_tool_hunter.py

      - name: Commit and push updated dedup file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_tools.json
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update sent_tools.json [skip ci]"
            git push
          fi