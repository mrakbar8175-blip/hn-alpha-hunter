jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # 👇 Restore the saved IDs from the previous run (if any)
      - name: Download previous sent IDs
        uses: actions/download-artifact@v4
        with:
          name: sent-ids
          path: .
        continue-on-error: true   # first run will have no artifact

      - name: Run idea miner
        env:
          IDEA_MINER_WEBHOOK: ${{ secrets.IDEA_MINER_WEBHOOK }}
        run: python idea_miner.py

      # 👇 Save the updated file for the next run
      - name: Upload updated sent IDs
        uses: actions/upload-artifact@v4
        with:
          name: sent-ids
          path: sent_ideas.json