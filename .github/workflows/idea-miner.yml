name: Daily Idea Miner

on:
  schedule:
    # Runs every day at 2:00 PM UTC (Adjust to your timezone)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  mine-ideas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run the Reddit Idea Miner
        env:
          # Notice we use a DIFFERENT secret name here
          IDEA_MINER_WEBHOOK: ${{ secrets.IDEA_MINER_WEBHOOK }}
        run: python idea_miner.py