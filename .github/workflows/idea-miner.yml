name: Daily Idea Miner

on:
  schedule:
    - cron: '0 10 * * *'   # Runs every day at 10:00 UTC (adjust as needed)
  workflow_dispatch:        # Allows manual triggering

jobs:
  mine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download previously sent IDs
        uses: actions/download-artifact@v4
        with:
          name: sent-ids
          path: .
        continue-on-error: true   # No artifact on first run

      - name: Run Idea Miner
        env:
          IDEA_MINER_WEBHOOK: ${{ secrets.IDEA_MINER_WEBHOOK }}
        run: python idea_miner.py

      - name: Upload updated sent IDs
        uses: actions/upload-artifact@v4
        with:
          name: sent-ids
          path: sent_ideas.json